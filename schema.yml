          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CourseRequest'
        required: true
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
          description: ''
    patch:
      operationId: courses_partial_update
      summary: Kursni qisman yangilash
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Kurs.
        required: true
