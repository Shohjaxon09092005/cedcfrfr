        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
          description: ''
    delete:
      operationId: courses_destroy
      summary: Kursni o'chirish
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Kurs.
        required: true
      tags:
