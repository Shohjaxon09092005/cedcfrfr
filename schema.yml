          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
          description: ''
  /api/courses/{id}/:
    get:
      operationId: courses_retrieve
      description: Bitta kurs ma'lumotini olish.
      summary: Kurs detali
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Kurs.
        required: true
      tags:
      - courses
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
          description: ''
    put:
      operationId: courses_update
      summary: Kursni yangilash
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Kurs.
        required: true
