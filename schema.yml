openapi: 3.0.3
info:
  title: EduAI API
  version: 1.0.0
  description: EduAI ta'lim platformasi REST API – autentifikatsiya, kurslar, resurslar,
    testlar, progress va bildirishnomalar.
paths:
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: Email va parol bilan tizimga kirish. JWT access va refresh token
        qaytariladi.
      summary: Kirish
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - jwtAuth: []
      - bearerAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/auth/me/:
    get:
      operationId: auth_me_retrieve
      description: Bearer token orqali kirilgan foydalanuvchi ma'lumotlarini qaytaradi.
      summary: Joriy foydalanuvchi
      tags:
      - auth
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/auth/register/:
    post:
      operationId: auth_register_create
      description: 'Yangi foydalanuvchi ro''yxatdan o''tadi. Rol: admin, instructor
        (domla), student (talaba).'
      summary: Ro'yxatdan o'tish
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - jwtAuth: []
      - bearerAuth: []
      - {}
      responses:
        '201':
          description: No response body
  /api/courses/:
    get:
      operationId: courses_list
      description: Barcha kurslarni olish yoki filtrlash.
      summary: Kurslar ro'yxati
      tags:
      - courses
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
