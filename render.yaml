services:
  # ════════════════════════════════════════════
  # WEB SERVICE (Django)
  # ════════════════════════════════════════════
  - type: web
    name: eduai-backend
    env: python
    plan: free
    region: singapore
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn eduai_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,eduai-backend-k1o4.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: eduai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: eduai-redis
          property: connectionString
      - key: FRONTEND_URL
        value: "https://edu-ai-three-henna.vercel.app"
      - key: USE_SUPABASE
        value: "true"
      - key: USE_MOCK_AI_RESPONSES
        value: "false"
      # Quyidagilar Render Dashboard'dan qo'lda qo'shing:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: SUPABASE_URL
        value: "https://prexzsvxzxampyofojux.supabase.co"

  # ════════════════════════════════════════════
  # CELERY WORKER (Background Tasks)
  # ════════════════════════════════════════════
  - type: worker
    name: eduai-celery-worker
    env: python
    plan: free
    region: singapore
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A eduai_backend worker --loglevel=info --concurrency=1 --pool=solo"
    envVars:
      - key: DJANGO_SECRET_KEY
        fromService:
          type: web
          name: eduai-backend
          envVarKey: DJANGO_SECRET_KEY
      - key: DJANGO_DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: eduai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: eduai-redis
          property: connectionString
      - key: USE_SUPABASE
        value: "true"
      - key: USE_MOCK_AI_RESPONSES
        value: "false"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: SUPABASE_URL
        value: "https://prexzsvxzxampyofojux.supabase.co"

  # ════════════════════════════════════════════
  # REDIS
  # ════════════════════════════════════════════
  - type: redis
    name: eduai-redis
    plan: free
    region: singapore
    ipAllowList: []

# ════════════════════════════════════════════
# DATABASE (PostgreSQL)
# ════════════════════════════════════════════
databases:
  - name: eduai-db
    plan: free
    region: singapore